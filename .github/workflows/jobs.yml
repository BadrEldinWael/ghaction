name: jobs 
on:
    workflow_dispatch:
jobs:
    job_1:
        runs-on: ubuntu-latest
        steps:
          - name: print1
            run: echo "${{ github.job }}"
    job_2:
        runs-on: ubuntu-latest
        needs: job_1
        steps:
          - name: print2
            run: echo "${{ github.job }}"
    job_3:
        runs-on: ubuntu-latest
        needs: job_1
        steps:
          - name: print3
            run: echo "${{ github.job }}"
    job_4:
        runs-on: ubuntu-latest
        needs:
            - job_1
            - job_2
            - job_3
        steps:
          - name: print4
            run: echo "${{ github.job }}"